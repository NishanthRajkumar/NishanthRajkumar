<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Nishanth Rajkumar - Data Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbee"/>
      <stop offset="50%" stop-color="#f4fbfb"/>
      <stop offset="100%" stop-color="#fffaf6"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="180" fill="#c2410c" fill-opacity="0.10"/>
  <circle cx="120" cy="520" r="200" fill="#0f766e" fill-opacity="0.10"/>
  <text x="80" y="180" font-family="'Source Serif 4', Georgia, serif" font-size="36" font-weight="600" fill="#0f766e" letter-spacing="6">CLOUD DATA ENGINEERING</text>
  <text x="80" y="300" font-family="'Source Serif 4', Georgia, serif" font-size="92" font-weight="700" fill="#1d2433">Nishanth Rajkumar</text>
  <text x="80" y="380" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="40" fill="#455062">Data systems that stay reliable at enterprise scale.</text>
  <g font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="28" fill="#1d2433">
    <rect x="80" y="450" width="240" height="80" rx="14" fill="#fffdf8" stroke="#e3ddcf"/>
    <text x="200" y="488" text-anchor="middle" font-weight="700" fill="url(#ink)">15TB+</text>
    <text x="200" y="514" text-anchor="middle" font-size="18" fill="#455062">Data Scale</text>

    <rect x="340" y="450" width="240" height="80" rx="14" fill="#fffdf8" stroke="#e3ddcf"/>
    <text x="460" y="488" text-anchor="middle" font-weight="700" fill="url(#ink)">80%</text>
    <text x="460" y="514" text-anchor="middle" font-size="18" fill="#455062">Productivity Gain</text>

    <rect x="600" y="450" width="240" height="80" rx="14" fill="#fffdf8" stroke="#e3ddcf"/>
    <text x="720" y="488" text-anchor="middle" font-weight="700" fill="url(#ink)">Azure · GCP</text>
    <text x="720" y="514" text-anchor="middle" font-size="18" fill="#455062">Cross-cloud Delivery</text>

    <rect x="860" y="450" width="240" height="80" rx="14" fill="#fffdf8" stroke="#e3ddcf"/>
    <text x="980" y="488" text-anchor="middle" font-weight="700" fill="url(#ink)">Databricks</text>
    <text x="980" y="514" text-anchor="middle" font-size="18" fill="#455062">Spark Engineering</text>
  </g>
  <text x="80" y="600" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="22" fill="#455062">nishanthrajkumar.me</text>
</svg>
