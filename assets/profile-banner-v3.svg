      <text x="14" y="24" fill="#F2FCFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">15TB+</text>
      <text x="14" y="41" fill="#CBE1F3" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600">Enterprise Data Scale Handled</text>
