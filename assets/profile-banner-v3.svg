<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071426"/>
      <stop offset="0.52" stop-color="#0D2742"/>
      <stop offset="1" stop-color="#15466A"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#65DAFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#65DAFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent3" x1="80" y1="80" x2="1140" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#54D7FF"/>
      <stop offset="0.5" stop-color="#9BE8C8"/>
      <stop offset="1" stop-color="#FFCE83"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="softRight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <linearGradient id="leftShade" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020A14" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#020A14" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipRounded">
      <rect width="1200" height="420" rx="36"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clipRounded)">

  <rect width="1200" height="420" rx="36" fill="url(#bg3)"/>
  <rect x="0" y="0" width="760" height="420" fill="url(#leftShade)"/>

  <polygon points="0,0 500,0 260,420 0,420" fill="url(#beam)" opacity="0.35"/>
  <polygon points="820,0 1200,0 1200,420 980,420" fill="#B5DBFF" fill-opacity="0.07"/>

  <circle cx="1080" cy="84" r="92" fill="#6FDFFF" fill-opacity="0.08" filter="url(#softRight)"/>
  <circle cx="122" cy="364" r="86" fill="#FFC982" fill-opacity="0.1" filter="url(#soft)"/>


  <g transform="translate(74 72)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.1"/>
    <text x="80" y="24" text-anchor="middle" fill="#D2DEEF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">PORTFOLIO</text>
