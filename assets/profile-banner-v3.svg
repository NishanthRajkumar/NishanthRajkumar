      <text x="12" y="24" fill="#F2FFF9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">80%</text>
      <text x="12" y="41" fill="#CBE8DE" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="600">Prod Gain</text>
