  <text x="74" y="176" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700">Nishanth Rajkumar</text>

  <text x="74" y="218" fill="#ECF3FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    <tspan x="74" dy="0">Data Engineer | Cloud Data Platforms</tspan>
    <tspan x="74" dy="30">AI-Assisted Engineering</tspan>
