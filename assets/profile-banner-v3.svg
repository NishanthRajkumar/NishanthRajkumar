      <text x="12" y="24" fill="#FFF8EA" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">22</text>
      <text x="12" y="41" fill="#F0DDC0" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="600">Improvements</text>
